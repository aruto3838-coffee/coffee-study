<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>コーヒーインストラクター1級 フラッシュカード</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 {
    font-size: 1.4em;
    margin-bottom: 8px;
    color: #c8a96e;
    text-align: center;
  }
  .subtitle { font-size: 0.85em; color: #888; margin-bottom: 20px; text-align: center; }

  /* カテゴリフィルター */
  .categories {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 20px;
  }
  .cat-btn {
    padding: 6px 14px; border-radius: 20px; border: 1px solid #444;
    background: #16213e; color: #aaa; cursor: pointer; font-size: 0.8em;
    transition: all 0.2s;
  }
  .cat-btn.active { background: #c8a96e; color: #1a1a2e; border-color: #c8a96e; font-weight: bold; }
  .cat-btn:hover { border-color: #c8a96e; color: #c8a96e; }

  /* 進捗 */
  .progress-bar-wrap {
    width: 100%; max-width: 560px; height: 6px;
    background: #333; border-radius: 3px; margin-bottom: 10px;
  }
  .progress-bar {
    height: 6px; background: #c8a96e; border-radius: 3px;
    transition: width 0.3s;
  }
  .progress-text { font-size: 0.82em; color: #888; margin-bottom: 18px; text-align: center; }

  /* カード */
  .card-wrap {
    width: 100%; max-width: 560px; perspective: 1200px;
    margin-bottom: 20px; cursor: pointer;
  }
  .card {
    width: 100%; min-height: 220px;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
    border-radius: 16px;
  }
  .card.flipped { transform: rotateY(180deg); }
  .card-face {
    position: absolute; width: 100%; min-height: 220px;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 30px 28px;
    text-align: center;
  }
  .card-front {
    background: linear-gradient(135deg, #16213e, #0f3460);
    border: 1px solid #2a4a7f;
    transition: background 0.3s, border-color 0.3s;
  }
  .card-front.hinting {
    background: linear-gradient(135deg, #1c2e1c, #0f3f22);
    border: 1px solid #2a7f4a;
  }
  .card-back {
    background: linear-gradient(135deg, #2d1b00, #5c3a00);
    border: 1px solid #8a5c00;
    transform: rotateY(180deg);
  }
  .card-label {
    font-size: 0.7em; letter-spacing: 2px; text-transform: uppercase;
    color: #c8a96e; margin-bottom: 14px; font-weight: bold;
  }
  .card-label.hint-label { color: #7fcf90; }
  .card-label.answer { color: #f0c060; }
  .card-question { font-size: 1.12em; line-height: 1.7; color: #e8e8e8; }
  .card-answer { font-size: 1.05em; line-height: 1.75; color: #ffe8a0; }
  .card-hint-text {
    font-size: 1.05em; line-height: 1.75; color: #a0efb0;
    display: none; margin-top: 6px;
  }
  .card-hint-text.visible { display: block; }
  .card-tap-hint { font-size: 0.75em; color: #888; margin-top: 18px; }
  .card-category {
    font-size: 0.7em; color: #6a8fbf; margin-bottom: 8px;
    text-align: right; width: 100%;
    position: absolute; top: 14px; right: 20px;
  }
  /* ヒント状態インジケーター */
  .state-dots {
    display: flex; gap: 6px; justify-content: center;
    margin-bottom: 14px;
  }
  .state-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #333; transition: background 0.3s;
  }
  .state-dot.active { background: #c8a96e; }
  .state-dot.done { background: #7fcf90; }

  /* ヒントボタン */
  .hint-btn-row {
    width: 100%; max-width: 560px;
    display: flex; justify-content: center;
    margin-bottom: 12px;
  }
  .hint-btn-row.hidden { display: none; }
  .btn-hint {
    padding: 9px 26px; border-radius: 20px;
    border: 1px solid #3a7a50; background: #1a3a28;
    color: #7fcf90; font-size: 0.88em; cursor: pointer;
    font-weight: bold; transition: all 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-hint:hover { background: #224a34; border-color: #5aaa70; }
  .btn-hint.active { background: #224a34; border-color: #7fcf90; color: #b0ffb8; }

  /* ボタン */
  .btn-row {
    display: flex; gap: 12px; justify-content: center;
    width: 100%; max-width: 560px; margin-bottom: 12px;
  }
  .btn {
    padding: 11px 28px; border-radius: 8px; border: none;
    font-size: 0.9em; cursor: pointer; font-weight: bold;
    transition: all 0.2s;
  }
  .btn-primary { background: #c8a96e; color: #1a1a2e; }
  .btn-primary:hover { background: #e0c080; }
  .btn-secondary { background: #333; color: #ccc; border: 1px solid #555; }
  .btn-secondary:hover { background: #444; }
  .btn-danger { background: #8b2020; color: #fff; }
  .btn-danger:hover { background: #a02828; }

  /* 判定ボタン */
  .judge-row {
    display: flex; gap: 12px; justify-content: center;
    width: 100%; max-width: 560px; margin-bottom: 12px;
  }
  .judge-btn {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-size: 0.92em; cursor: pointer; font-weight: bold;
    transition: all 0.2s;
  }
  .judge-ok { background: #1a5c2a; color: #7fff9a; border: 1px solid #2a8c3a; }
  .judge-ok:hover { background: #226633; }
  .judge-ng { background: #5c1a1a; color: #ff9090; border: 1px solid #8c2a2a; }
  .judge-ng:hover { background: #6b2020; }
  .judge-row.hidden { display: none; }

  /* 統計 */
  .stats {
    display: flex; gap: 20px; margin-bottom: 20px;
    font-size: 0.82em; color: #888;
  }
  .stat-ok { color: #7fff9a; }
  .stat-ng { color: #ff9090; }

  /* 完了画面 */
  .complete {
    display: none; text-align: center;
    background: #16213e; border: 1px solid #2a4a7f;
    border-radius: 16px; padding: 40px; width: 100%; max-width: 560px;
  }
  .complete h2 { color: #c8a96e; font-size: 1.5em; margin-bottom: 16px; }
  .complete p { color: #aaa; line-height: 1.8; }
  .score-big { font-size: 2.5em; color: #ffe080; font-weight: bold; margin: 16px 0; }

  table { border-collapse: collapse; width: 100%; font-size: 0.88em; }
  th { background: #0f3460; color: #c8a96e; padding: 6px 10px; text-align: left; }
  td { padding: 6px 10px; border-bottom: 1px solid #2a2a3e; color: #ddd; }

  @media (max-width: 500px) {
    .card-question { font-size: 1em; }
    .btn { padding: 10px 18px; font-size: 0.85em; }
  }
</style>
</head>
<body>

<div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:-8px;padding-top:8px">
  <a href="index.html" style="text-decoration:none;font-size:22px;opacity:0.7">◀</a>
  <h1 style="margin:0">☕ コーヒーインストラクター1級</h1>
</div>
<p class="subtitle">カードをタップ → 答え ／ 💡ボタン → ヒント</p>

<div style="width:100%;max-width:560px;background:#16213e;padding:12px 14px;border-radius:10px;margin-bottom:14px;">
  <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
    <span style="font-size:0.85em;color:#c8a96e;min-width:80px;">出題範囲：</span>
    <button class="cat-btn active" id="scopeAll" data-scope="all">全て</button>
    <button class="cat-btn" id="scopeWrong" data-scope="wrong">間違えた問題のみ <span id="wrongCount">(0)</span></button>
    <button class="cat-btn" id="clearWrongs" style="margin-left:auto;">履歴クリア</button>
  </div>
</div>

<div class="categories" id="catBtns"></div>

<div class="progress-bar-wrap"><div class="progress-bar" id="progressBar"></div></div>
<div class="progress-text" id="progressText"></div>
<div class="stats">
  <span>正解: <span class="stat-ok" id="okCount">0</span></span>
  <span>不正解: <span class="stat-ng" id="ngCount">0</span></span>
  <span>残り: <span id="leftCount">0</span></span>
</div>

<div class="card-wrap" id="cardWrap" onclick="tapCard()">
  <div class="card" id="card">
    <div class="card-face card-front" id="cardFront">
      <div class="card-category" id="cardCat"></div>
      <div class="card-label">問 題</div>
      <div class="card-question" id="cardQ"></div>
      <div class="card-hint-text" id="cardHintText"></div>
      <div class="card-tap-hint" id="tapHint">タップして答えを見る</div>
    </div>
    <div class="card-face card-back">
      <div class="card-label answer">答 え</div>
      <div class="card-answer" id="cardA"></div>
    </div>
  </div>
</div>

<!-- ヒントボタン（カード直下） -->
<div class="hint-btn-row" id="hintBtnRow">
  <button class="btn-hint" id="hintBtn" onclick="toggleHint(event)">💡 ヒントを見る</button>
</div>

<div class="judge-row hidden" id="judgeRow">
  <button class="judge-btn judge-ng" onclick="judge(false)">✗ もう一度</button>
  <button class="judge-btn judge-ok" onclick="judge(true)">✓ 正解！</button>
</div>

<div class="btn-row">
  <button class="btn btn-secondary" onclick="prevCard()">← 前へ</button>
  <button class="btn btn-primary" onclick="nextCard()">次へ →</button>
  <button class="btn btn-secondary" onclick="shuffle()">シャッフル</button>
</div>
<div class="btn-row">
  <button class="btn btn-danger" onclick="resetAll()">最初からやり直す</button>
</div>

<div class="complete" id="complete">
  <h2>🎉 ラウンド完了！</h2>
  <div class="score-big" id="scoreText"></div>
  <p id="scoreMsg"></p>
  <br>
  <div class="btn-row" style="justify-content:center">
    <button class="btn btn-primary" onclick="restartNG()">不正解のみ再挑戦</button>
    <button class="btn btn-secondary" onclick="resetAll()">全部やり直す</button>
  </div>
</div>

  catch(e) { return new Set(); }
}
function saveFlashWrongs(set) {
  localStorage.setItem(FLASH_WRONG_KEY, JSON.stringify([...set]));
}

let deck = [];
let currentIdx = 0;
let cardState = 0; // 0=問題, 1=ヒント, 2=答え
let okSet = new Set();
let ngSet = new Set();
let selectedCats = new Set();
let allCats = [];
let scope = 'all'; // 'all' | 'wrong'
let persistentWrongs = loadFlashWrongs();
let cardsByCat = {};

// ヒントを自動生成する関数
function makeHint(answer) {
  const a = answer.trim();
  // 数値・年代は最初の数字だけ見せる
  if (/^\d/.test(a)) {
    const m = a.match(/^(\d+)/);
    return m ? `${m[1]}〜 ？？？` : a.slice(0, 10) + '…';
  }
  // 短い答え（15文字以下）→ 文字数ヒント＋最初の1文字
  if (a.length <= 15) {
    return `最初の文字: 「${a[0]}」（全${a.length}文字）`;
  }
  // 長い答え → 最初の句読点・読点・「。」まで or 20文字
  const cutAt = a.search(/[。、・\n]/);
  if (cutAt > 0 && cutAt <= 25) {
    return a.slice(0, cutAt) + '…';
  }
  return a.slice(0, 20) + '…';
}

function init() {
  allCats = [...new Set(ALL_CARDS.map(c => c.cat))];
  cardsByCat = {};
  for (const c of ALL_CARDS) {
    if (!cardsByCat[c.cat]) cardsByCat[c.cat] = [];
    cardsByCat[c.cat].push(c);
  }
  // デフォルトは「全部」（selectedCatsを空にして全部扱い）
  selectedCats = new Set();
  updateWrongCount();
  buildCatBtns();

  // 出題範囲ボタン
  document.getElementById('scopeAll').onclick = () => setScope('all');
  document.getElementById('scopeWrong').onclick = () => setScope('wrong');
  document.getElementById('clearWrongs').onclick = () => {
    if (persistentWrongs.size === 0) { alert('履歴は空です'); return; }
    if (confirm('間違えた問題の履歴 (' + persistentWrongs.size + '問) をクリアしますか？')) {
      persistentWrongs.clear();
      saveFlashWrongs(persistentWrongs);
      updateWrongCount();
      if (scope === 'wrong') setScope('all');
    }
  };

  buildDeck();
  renderCard();
}

function setScope(s) {
  scope = s;
  document.getElementById('scopeAll').classList.toggle('active', s === 'all');
  document.getElementById('scopeWrong').classList.toggle('active', s === 'wrong');
  buildDeck();
  renderCard();
}

function updateWrongCount() {
  const el = document.getElementById('wrongCount');
  if (el) el.textContent = '(' + persistentWrongs.size + ')';
}

function buildCatBtns() {
  const wrap = document.getElementById('catBtns');
  wrap.innerHTML = '';
  // 全部ボタン
  const all = document.createElement('button');
  all.className = 'cat-btn' + (selectedCats.size === 0 ? ' active' : '');
  all.textContent = '全部 (' + ALL_CARDS.length + ')';
  all.onclick = () => {
    selectedCats.clear();
    buildCatBtns();
    buildDeck();
    renderCard();
  };
  wrap.appendChild(all);

  allCats.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (selectedCats.has(cat) ? ' active' : '');
    btn.textContent = cat + ' (' + cardsByCat[cat].length + ')';
    btn.onclick = () => {
      if (selectedCats.has(cat)) selectedCats.delete(cat);
      else selectedCats.add(cat);
      buildCatBtns();
      buildDeck();
      renderCard();
    };
    wrap.appendChild(btn);
  });
}

function buildDeck(onlyNG = false) {
  let pool;
  if (onlyNG) {
    pool = ALL_CARDS.filter((c, i) => ngSet.has(i));
  } else {
    pool = ALL_CARDS.slice();
  }
  // カテゴリフィルタ（空 = 全部）
  if (selectedCats.size > 0) {
    pool = pool.filter(c => selectedCats.has(c.cat));
  }
  // スコープフィルタ
  if (scope === 'wrong') {
    pool = pool.filter(c => persistentWrongs.has(c.id));
  }
  deck = pool.map(c => ({...c, origIdx: ALL_CARDS.indexOf(c)}));
  currentIdx = 0;
  okSet.clear(); ngSet.clear();
  hideComplete();
}

function shuffle() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  currentIdx = 0;
  okSet.clear(); ngSet.clear();
  hideComplete();
  renderCard();
}

function renderCard() {
  if (deck.length === 0) { showComplete(); return; }
  if (currentIdx >= deck.length) { showComplete(); return; }

  const c = deck[currentIdx];
  document.getElementById('cardCat').textContent = c.cat;
  document.getElementById('cardQ').textContent = c.q;
  document.getElementById('cardA').textContent = c.a;
  document.getElementById('cardHintText').textContent = makeHint(c.a);

  // 状態リセット
  cardState = 0;
  resetCardDisplay();

  document.getElementById('judgeRow').classList.add('hidden');

  const total = deck.length;
  const done = okSet.size + ngSet.size;
  document.getElementById('progressBar').style.width = (done / total * 100) + '%';
  document.getElementById('progressText').textContent =
    `${currentIdx + 1} / ${total} 枚`;
  document.getElementById('okCount').textContent = okSet.size;
  document.getElementById('ngCount').textContent = ngSet.size;
  document.getElementById('leftCount').textContent = total - done;
  hideComplete();
}

function resetCardDisplay() {
  const card = document.getElementById('card');
  const front = document.getElementById('cardFront');
  const hintText = document.getElementById('cardHintText');
  const hintBtn = document.getElementById('hintBtn');
  const hintBtnRow = document.getElementById('hintBtnRow');

  card.classList.remove('flipped');
  front.classList.remove('hinting');
  hintText.classList.remove('visible');
  hintBtn.textContent = '💡 ヒントを見る';
  hintBtn.classList.remove('active');
  hintBtnRow.classList.remove('hidden');
  document.getElementById('tapHint').textContent = 'タップして答えを見る';
}

// カードをタップ → 即答えを表示
function tapCard() {
  if (currentIdx >= deck.length) return;
  if (cardState === 2) return; // すでに答え表示中
  cardState = 2;
  const card = document.getElementById('card');
  card.classList.add('flipped');
  document.getElementById('hintBtnRow').classList.add('hidden');
  document.getElementById('judgeRow').classList.remove('hidden');
}

// ヒントボタン → ヒントのみ表示（答えは見せない）
function toggleHint(e) {
  e.stopPropagation(); // カードのtapCardが発火しないように
  if (cardState === 2) return; // 答え表示中は無視

  const front = document.getElementById('cardFront');
  const hintText = document.getElementById('cardHintText');
  const hintBtn = document.getElementById('hintBtn');

  const showing = hintText.classList.contains('visible');
  if (showing) {
    // ヒントを隠す
    hintText.classList.remove('visible');
    front.classList.remove('hinting');
    hintBtn.textContent = '💡 ヒントを見る';
    hintBtn.classList.remove('active');
  } else {
    // ヒントを表示
    hintText.classList.add('visible');
    front.classList.add('hinting');
    hintBtn.textContent = '💡 ヒントを隠す';
    hintBtn.classList.add('active');
  }
}

function judge(ok) {
  const c = deck[currentIdx];
  const idx = c.origIdx !== undefined ? c.origIdx : currentIdx;
  if (ok) {
    okSet.add(idx); ngSet.delete(idx);
    // 正解した場合は永続履歴から除去
    if (persistentWrongs.has(c.id)) {
      persistentWrongs.delete(c.id);
      saveFlashWrongs(persistentWrongs);
      updateWrongCount();
    }
  } else {
    ngSet.add(idx); okSet.delete(idx);
    persistentWrongs.add(c.id);
    saveFlashWrongs(persistentWrongs);
    updateWrongCount();
  }
  currentIdx++;
  cardState = 0;
  if (currentIdx >= deck.length) { showComplete(); return; }
  renderCard();
}

function nextCard() {
  if (currentIdx < deck.length - 1) {
    currentIdx++;
    cardState = 0;
    renderCard();
  }
}

function prevCard() {
  if (currentIdx > 0) {
    currentIdx--;
    cardState = 0;
    renderCard();
  }
}

function showComplete() {
  document.getElementById('cardWrap').style.display = 'none';
  document.getElementById('judgeRow').classList.add('hidden');
  document.querySelector('.btn-row').style.display = 'none';
  document.querySelector('.btn-row + .btn-row').style.display = 'none';

  const total = okSet.size + ngSet.size;
  const rate = total > 0 ? Math.round(okSet.size / total * 100) : 0;
  document.getElementById('scoreText').textContent = `${okSet.size} / ${total} 正解 (${rate}%)`;
  let msg = rate === 100 ? '🎉 全問正解！素晴らしい！' :
            rate >= 80 ? '👏 よくできました！あと少し！' :
            rate >= 60 ? '📚 もう一息！不正解を復習しましょう' :
            '💪 繰り返し練習しましょう！';
  document.getElementById('scoreMsg').textContent = msg;
  document.getElementById('complete').style.display = 'block';
  document.getElementById('progressBar').style.width = '100%';
  document.getElementById('progressText').textContent = `完了 ${total}枚`;
}

function hideComplete() {
  document.getElementById('complete').style.display = 'none';
  document.getElementById('cardWrap').style.display = 'block';
  const rows = document.querySelectorAll('.btn-row');
  rows.forEach(r => r.style.display = 'flex');
}

function restartNG() {
  const ngCards = ALL_CARDS.filter((c, i) => ngSet.has(i) && selectedCats.has(c.cat));
  if (ngCards.length === 0) { resetAll(); return; }
  deck = ngCards.map((c, i) => ({...c, origIdx: ALL_CARDS.indexOf(c)}));
  currentIdx = 0; okSet.clear(); ngSet.clear();
  hideComplete();
  renderCard();
}

function resetAll() {
  buildDeck();
  hideComplete();
  renderCard();
}

init();
</script>
</body>
</html>
