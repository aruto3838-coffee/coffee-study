<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>コーヒーインストラクター1級 学習ツール</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#1a1a2e;--card:#16213e;--accent:#c8a96e;--accent2:#e8d5a8;--text:#e0e0e0;--text2:#999}
html,body{min-height:100%;font-family:'Helvetica Neue','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text)}

.container{max-width:480px;margin:0 auto;padding:24px 16px;min-height:100vh;display:flex;flex-direction:column}

/* Header */
.hero{text-align:center;padding:36px 0 28px}
.hero-icon{font-size:56px;margin-bottom:12px;display:block}
.hero-title{font-size:22px;font-weight:800;color:var(--accent2);letter-spacing:0.5px}
.hero-sub{font-size:13px;color:var(--text2);margin-top:6px}

/* Countdown */
.countdown{
  background:linear-gradient(135deg,rgba(200,169,110,0.15),rgba(200,169,110,0.05));
  border:1px solid rgba(200,169,110,0.25);border-radius:16px;
  padding:14px 20px;text-align:center;margin-bottom:28px;
}
.countdown-label{font-size:12px;color:var(--text2)}
.countdown-num{font-size:32px;font-weight:800;color:var(--accent);margin:4px 0}
.countdown-date{font-size:12px;color:var(--text2)}

/* Cards */
.cards{display:flex;flex-direction:column;gap:14px;flex:1}
.card{
  background:var(--card);border:1px solid rgba(200,169,110,0.18);
  border-radius:18px;padding:22px 20px;
  text-decoration:none;color:inherit;
  display:flex;align-items:center;gap:16px;
  transition:transform 0.15s,border-color 0.15s;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
}
.card:active{transform:scale(0.97);border-color:var(--accent)}

.card-icon{
  width:56px;height:56px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;flex-shrink:0;
}
.card-icon.study{background:linear-gradient(135deg,#0f3460,#16213e)}
.card-icon.flash{background:linear-gradient(135deg,#1a3a2e,#16213e)}
.card-icon.map{background:linear-gradient(135deg,#3a1a2e,#16213e)}

.card-body{flex:1;min-width:0}
.card-title{font-size:16px;font-weight:700;color:var(--accent2);margin-bottom:4px}
.card-desc{font-size:12px;color:var(--text2);line-height:1.5}
.card-arrow{color:var(--accent);font-size:18px;flex-shrink:0;opacity:0.6}

/* Footer */
.footer{text-align:center;padding:28px 0 16px;font-size:11px;color:var(--text2)}
.footer span{color:var(--accent)}
</style>
</head>
<body>
<div class="container">

  <div class="hero">
    <span class="hero-icon">&#9749;</span>
    <div class="hero-title">コーヒーインストラクター1級</div>
    <div class="hero-sub">学習ツール</div>
  </div>

  <div class="countdown">
    <div class="countdown-label">試験まであと</div>
    <div class="countdown-num" id="daysLeft">--</div>
    <div class="countdown-date">2026年7月4日</div>
  </div>

  <div class="cards">

    <a class="card" href="study.html">
      <div class="card-icon study">&#128218;</div>
      <div class="card-body">
        <div class="card-title">勉強アプリ</div>
        <div class="card-desc">27章 / 233レッスン+クイズ<br>教科書ベース完全書き下ろし</div>
      </div>
      <div class="card-arrow">&#8250;</div>
    </a>

    <a class="card" href="quiz.html">
      <div class="card-icon" style="background:linear-gradient(135deg,#1a2e3a,#16213e)">&#10067;</div>
      <div class="card-body">
        <div class="card-title">選択肢クイズ <span style="color:#7fcf90;font-size:11px;margin-left:4px;">NEW</span></div>
        <div class="card-desc">フラッシュカード142問を4〜10択化<br>カード前のステップアップに</div>
      </div>
      <div class="card-arrow">&#8250;</div>
    </a>

    <a class="card" href="flash.html">
      <div class="card-icon flash">&#127183;</div>
      <div class="card-body">
        <div class="card-title">フラッシュカード</div>
        <div class="card-desc">カテゴリ別の暗記カード<br>自己判定 &amp; 不正解カード復習</div>
      </div>
      <div class="card-arrow">&#8250;</div>
    </a>

    <a class="card" href="map.html">
      <div class="card-icon map">&#127759;</div>
      <div class="card-body">
        <div class="card-title">地図クイズ</div>
        <div class="card-desc">生産国の位置を地図で確認<br>視覚的に産地を暗記</div>
      </div>
      <div class="card-arrow">&#8250;</div>
    </a>

    <a class="card" href="drill.html">
      <div class="card-icon" style="background:linear-gradient(135deg,#3a2a1a,#16213e)">&#128170;</div>
      <div class="card-body">
        <div class="card-title">穴埋めドリル</div>
        <div class="card-desc">教科書レイアウト再現 &amp; 穴埋め<br>全12セクション / 441問</div>
      </div>
      <div class="card-arrow">&#8250;</div>
    </a>

  </div>

  <div class="footer">目指せ満点 <span>&#9733;</span> 2026年7月4日</div>

</div>

<script>
(function(){
  const exam = new Date(2026, 6, 4);
  const now = new Date();
  now.setHours(0,0,0,0);
  const diff = Math.max(0, Math.ceil((exam - now) / (24*60*60*1000)));
  document.getElementById('daysLeft').textContent = diff + '日';
})();
</script>
</body>
</html>
