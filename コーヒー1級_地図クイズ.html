*{box-sizing:border-box;margin:0;padding:0}
body{background:#1a1a2e;color:#e0d5c5;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;padding:10px}
h1{text-align:center;font-size:1.15rem;color:#c8a96e;margin-bottom:8px;letter-spacing:.05em}
.tabs{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin-bottom:12px}
.tab{background:#16213e;border:1.5px solid #2d4a6e;color:#9eb3cc;padding:6px 11px;border-radius:20px;cursor:pointer;font-size:.76rem;transition:all .2s}
.tab.active{background:#c8a96e;border-color:#c8a96e;color:#1a1a2e;font-weight:700}
.quiz-area{max-width:640px;margin:0 auto}
.map-wrap{position:relative;border-radius:10px;overflow:hidden;margin-bottom:10px;background:#111118}
.map-wrap svg{width:100%;display:block}
.sub-label{text-align:center;font-size:.72rem;color:#9eb3cc;margin-bottom:4px;font-weight:600}
.country{fill:#C0C0C0;stroke:#888;stroke-width:0.5px;vector-effect:non-scaling-stroke}
.country.highlight-correct{fill:#FFD700 !important;stroke:#FFD700;stroke-width:1.5px}
.country.highlight-wrong{fill:#E84040 !important;stroke:#E84040;stroke-width:1.5px}
.equator{stroke:#D42020;stroke-width:1.2px;stroke-dasharray:6,3;fill:none;opacity:0.8}
.internal-border{fill:none;stroke:#FFD700;stroke-width:1px;stroke-opacity:0.7;pointer-events:none}
.region-dot{fill:#222;stroke:#fff;stroke-width:0.5px;pointer-events:none}
.ref-label{font-size:9px;fill:#444;text-anchor:middle;dominant-baseline:central;pointer-events:none}
.ref-label.italic{font-style:italic;fill:#667}
.ref-label.small{font-size:7.5px}
.ref-bg{fill:rgba(255,255,255,0.85);stroke:#999;stroke-width:0.5px;rx:2;ry:2}
.pin-group{cursor:pointer}
.pin-dot{stroke:#222;stroke-width:0.8px}
.pin-label{font-weight:900;font-size:13px;fill:#222;text-anchor:start;dominant-baseline:central;pointer-events:none;paint-order:stroke fill;stroke:#fff;stroke-width:3px;stroke-linejoin:round}
.pin-group.correct .pin-dot{fill:#FFD700 !important;r:5}
.pin-group.correct .pin-label{fill:#FFD700;stroke:#222}
.pin-group.wrong .pin-dot{fill:#E84040 !important;r:5}
.pin-group.wrong .pin-label{fill:#E84040;stroke:#222}
.q-box{background:#0f3460;border-radius:10px;padding:12px;text-align:center;margin-bottom:10px}
.q-label{font-size:.72rem;color:#9eb3cc;margin-bottom:4px}
.q-text{font-size:1.05rem;font-weight:700;color:#fff;line-height:1.5}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.c-btn{background:#16213e;border:1.5px solid #2d4a6e;color:#e0d5c5;padding:10px 6px;border-radius:8px;cursor:pointer;font-size:.88rem;text-align:center;transition:all .2s;line-height:1.3;display:flex;align-items:center;justify-content:center;gap:6px}
.c-btn:hover{border-color:#c8a96e;color:#c8a96e}
.c-btn.correct{background:#3a3510;border-color:#FFD700;color:#FFD700;font-weight:700}
.c-btn.wrong{background:#4a1a1a;border-color:#e05555;color:#e05555}
.c-btn:disabled{cursor:default;opacity:.8}
.c-badge{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;font-weight:900;font-size:.88rem;flex-shrink:0}
.fb{text-align:center;padding:10px;border-radius:8px;font-size:.92rem;font-weight:700;margin-bottom:8px;min-height:42px}
.fb.ok{background:#2a2a10;color:#FFD700}
.fb.ng{background:#3a1a1a;color:#e05555}
.fb.hidden{visibility:hidden}
.next-btn{display:block;width:100%;background:#c8a96e;color:#1a1a2e;border:none;padding:11px;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;transition:opacity .2s}
.next-btn:hover{opacity:.85}
.prog-wrap{background:#0d1b2e;border-radius:4px;height:5px;margin-bottom:12px}
.prog{background:#c8a96e;height:5px;border-radius:4px;transition:width .4s}
.score{text-align:center;font-size:.82rem;color:#9eb3cc;margin-bottom:6px}
.result{text-align:center;background:#0f3460;border-radius:12px;padding:18px;margin-top:8px}
.result h2{color:#c8a96e;font-size:1.3rem;margin-bottom:6px}
.result p{color:#e0d5c5;margin-bottom:12px;font-size:.88rem}
.rst-btn{background:#0f3460;border:1.5px solid #c8a96e;color:#c8a96e;padding:9px 22px;border-radius:8px;cursor:pointer;font-size:.88rem;font-weight:700}
.loading{text-align:center;padding:40px;color:#9eb3cc}
</style>

let curRegion='central_south_america', qs=[], qi=0, sc=0, done=false;
let worldData=null, countriesGeo=null;

/* ===== INIT ===== */
function initTabs(){
  const bar=document.getElementById('tabBar');
  Object.entries(REGIONS).forEach(([k,v])=>{
    const b=document.createElement('button');
    b.className='tab'+(k===curRegion?' active':'');
    b.textContent=v.label;
    b.onclick=()=>go(k);
    bar.appendChild(b);
  });
}

function go(k){
  curRegion=k;
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',Object.keys(REGIONS)[i]===k);
  });
  start();
}

function shuffle(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.random()*(i+1)|0;
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function start(){
  /* Collect all questions from all maps in this region */
  const region=REGIONS[curRegion];
  qs=[];
  region.maps.forEach(mapKey=>{
    const questions=ALL_QUESTIONS[mapKey];
    if(questions){
      questions.forEach(q=>{
        qs.push({...q, _mapKey: mapKey});
      });
    }
  });
  qs=shuffle(qs);
  qi=0;sc=0;done=false;
  document.getElementById('res').style.display='none';
  document.getElementById('nxt').style.display='none';
  render();
}

/* ===== MAP RENDERING ===== */
function renderMap(mapKey, spotKeys, q){
  const wrap=document.getElementById('mapWrap');
  wrap.innerHTML='';

  const cfg=MAP_CFG[mapKey];
  document.getElementById('subLabel').textContent=cfg.subLabel;

  const W=wrap.clientWidth||360;
  const bounds=cfg.bounds;
  const geoW=bounds[1][0]-bounds[0][0];
  const geoH=bounds[1][1]-bounds[0][1];
  const centerLat=(bounds[0][1]+bounds[1][1])/2;
  const latStretch=1/Math.cos(centerLat*Math.PI/180);
  const H=Math.min(Math.round(W*(geoH*latStretch)/geoW), Math.round(W*0.85));

  const svg=d3.select(wrap).append('svg')
    .attr('width',W).attr('height',H)
    .attr('viewBox',`0 0 ${W} ${H}`)
    .style('background','#111118')
    .style('border-radius','10px');

  /* Manual center + scale for reliable zoom */
  const cLng=(bounds[0][0]+bounds[1][0])/2;
  const cLat=(bounds[0][1]+bounds[1][1])/2;
  const projection=d3.geoMercator()
    .center([cLng,cLat])
    .translate([W/2,H/2])
    .scale(150);
  /* Calculate required scale to fit bounds with 5% padding */
  const tl=projection([bounds[0][0],bounds[1][1]]);
  const br=projection([bounds[1][0],bounds[0][1]]);
  const curW=Math.abs(br[0]-tl[0]);
  const curH=Math.abs(br[1]-tl[1]);
  const fitScale=150*Math.min((W*0.9)/curW,(H*0.9)/curH);
  projection.scale(fitScale);

  const path=d3.geoPath().projection(projection);

  /* Draw all countries */
  const countryGroup=svg.append('g');
  countriesGeo.features.forEach(f=>{
    countryGroup.append('path')
      .datum(f)
      .attr('d',path)
      .attr('class','country')
      .attr('data-id',f.id);
  });

  /* Internal state/department borders */
  const borderKey = mapKey==='brazil'?'brazil': mapKey==='colombia'?'colombia': null;
  if(borderKey && INTERNAL_BORDERS[borderKey]){
    INTERNAL_BORDERS[borderKey].forEach(coords=>{
      const lineGeo={type:'Feature',geometry:{type:'LineString',coordinates:coords},properties:{}};
      svg.append('path')
        .datum(lineGeo)
        .attr('d',path)
        .attr('class','internal-border');
    });
  }

  /* Equator line */
  if(cfg.equator){
    const eqLine={type:'Feature',geometry:{type:'LineString',coordinates:[[-180,0],[180,0]]},properties:{}};
    svg.append('path')
      .datum(eqLine)
      .attr('d',path)
      .attr('class','equator');
  }

  /* Region dots (all locations shown as black dots for orientation) */
  if(cfg.regionDots){
    cfg.regionDots.forEach(rd=>{
      const [dx,dy]=projection([rd.lng,rd.lat]);
      if(isNaN(dx)||isNaN(dy))return;
      svg.append('circle')
        .attr('class','region-dot')
        .attr('cx',dx).attr('cy',dy)
        .attr('r',4);
    });
  }

  /* Reference labels (non-quiz place names with box) */
  if(cfg.refLabels){
    cfg.refLabels.forEach(rl=>{
      const [rx,ry]=projection([rl.lng,rl.lat]);
      if(isNaN(rx)||isNaN(ry))return;
      const cls='ref-label'+(rl.italic?' italic':'')+(rl.small?' small':'');
      /* Temporary text to measure width */
      const tmp=svg.append('text').attr('class',cls).text(rl.text).style('visibility','hidden');
      const bbox=tmp.node().getBBox();
      tmp.remove();
      /* Background box */
      svg.append('rect')
        .attr('class','ref-bg')
        .attr('x',rx-bbox.width/2-3).attr('y',ry-bbox.height/2-2)
        .attr('width',bbox.width+6).attr('height',bbox.height+4);
      /* Text */
      svg.append('text')
        .attr('class',cls)
        .attr('x',rx).attr('y',ry)
        .text(rl.text);
    });
  }

  /* Pin markers - small dot + smart label placement */
  const dotR=3;
  /* Project all spots first for collision detection */
  const projected=spotKeys.map((key)=>{
    const spot=q.spots[key];
    const [px,py]=projection([spot.lng,spot.lat]);
    return {key,px,py};
  });

  /* 8 directions for label offset */
  const DIRS=[
    {dx:6,dy:0,anchor:'start'},     /* E */
    {dx:5,dy:-6,anchor:'start'},    /* NE */
    {dx:-6,dy:0,anchor:'end'},      /* W */
    {dx:5,dy:8,anchor:'start'},     /* SE */
    {dx:-5,dy:-6,anchor:'end'},     /* NW */
    {dx:-5,dy:8,anchor:'end'},      /* SW */
    {dx:0,dy:-8,anchor:'middle'},   /* N */
    {dx:0,dy:10,anchor:'middle'},   /* S */
  ];

  /* For each pin, pick the direction with least overlap to other pins */
  const labelPlacements=projected.map((p,i)=>{
    let bestDir=DIRS[0], bestScore=Infinity;
    DIRS.forEach(dir=>{
      const lx=p.px+dir.dx, ly=p.py+dir.dy;
      let score=0;
      projected.forEach((other,j)=>{
        if(i===j)return;
        const dist=Math.hypot(lx-other.px,ly-other.py);
        if(dist<20) score+=20-dist;
      });
      if(score<bestScore){bestScore=score;bestDir=dir;}
    });
    return bestDir;
  });

  spotKeys.forEach((key,i)=>{
    const {px,py}=projected[i];
    if(isNaN(px)||isNaN(py))return;
    const dir=labelPlacements[i];

    const g=svg.append('g')
      .attr('class','pin-group')
      .attr('data-idx',i)
      .attr('data-key',key)
      .style('cursor','pointer')
      .on('click',()=>pick(i));

    /* Invisible click target */
    g.append('circle')
      .attr('cx',px).attr('cy',py)
      .attr('r',18)
      .attr('fill','transparent');

    /* Small dot */
    g.append('circle')
      .attr('class','pin-dot')
      .attr('cx',px).attr('cy',py)
      .attr('r',dotR)
      .attr('fill',PIN_COLORS[i]);

    /* Label with smart direction */
    g.append('text')
      .attr('class','pin-label')
      .attr('x',px+dir.dx).attr('y',py+dir.dy)
      .attr('text-anchor',dir.anchor)
      .text(LABELS[i]);
  });

  return {projection, svg, cfg, spotKeys, q};
}

/* ===== QUIZ ENGINE ===== */
let currentRender=null;

function render(){
  if(qi>=qs.length){showResult();return;}
  done=false;
  const q=qs[qi],total=qs.length;
  document.getElementById('pb').style.width=((qi/total)*100)+'%';
  document.getElementById('sc').textContent=`問題 ${qi+1} / ${total}　正解: ${sc}`;
  document.getElementById('qText').innerHTML=q.q;

  const spotKeys=shuffle(Object.keys(q.spots));
  window._spotKeys=spotKeys;
  window._ansIdx=spotKeys.indexOf(q.ans);

  currentRender=renderMap(q._mapKey, spotKeys, q);

  const ch=document.getElementById('ch');ch.innerHTML='';
  spotKeys.forEach((key,i)=>{
    const btn=document.createElement('button');
    btn.className='c-btn';
    btn.innerHTML=`<span class="c-badge" style="background:${PIN_COLORS[i]};color:#1a1a2e">${LABELS[i]}</span>`;
    btn.dataset.idx=i;
    btn.onclick=()=>pick(i);
    ch.appendChild(btn);
  });

  document.getElementById('fb').className='fb hidden';
  document.getElementById('nxt').style.display='none';
}

function pick(idx){
  if(done)return;done=true;
  const correct=idx===window._ansIdx;
  if(correct)sc++;

  const {svg,cfg,spotKeys,q}=currentRender;
  const ansKey=spotKeys[window._ansIdx];
  const wrongKey=spotKeys[idx];

  if(cfg.showCountryHighlight){
    const ansCid=q.spots[ansKey].cid;
    if(ansCid){
      svg.selectAll('.country').filter(d=>d.id===ansCid)
        .classed('highlight-correct',true);
    }
    if(!correct){
      const wrongCid=q.spots[wrongKey].cid;
      if(wrongCid){
        svg.selectAll('.country').filter(d=>d.id===wrongCid)
          .classed('highlight-wrong',true);
      }
    }
  }

  svg.selectAll('.pin-group').each(function(){
    const g=d3.select(this);
    const gIdx=parseInt(g.attr('data-idx'));
    if(gIdx===window._ansIdx) g.classed('correct',true);
    else if(gIdx===idx&&!correct) g.classed('wrong',true);
  });

  document.querySelectorAll('.c-btn').forEach(b=>{
    b.disabled=true;
    const bi=parseInt(b.dataset.idx);
    if(bi===window._ansIdx)b.classList.add('correct');
    else if(bi===idx&&!correct)b.classList.add('wrong');
  });

  const fb=document.getElementById('fb'),al=LABELS[window._ansIdx];
  fb.className='fb '+(correct?'ok':'ng');
  fb.textContent=correct?`✅ 正解！（${al}）`:`❌ 不正解… 正解は ${al} です`;

  const nxt=document.getElementById('nxt');
  nxt.style.display='block';
  nxt.textContent=qi+1<qs.length?'次の問題へ →':'結果を見る';
}

function next(){qi++;render();}

function showResult(){
  const total=qs.length,pct=Math.round(sc/total*100);
  document.getElementById('pb').style.width='100%';
  document.getElementById('sc').textContent='完了！';
  document.getElementById('qText').textContent='クイズ終了';
  document.getElementById('subLabel').textContent='';
  document.getElementById('ch').innerHTML='';
  document.getElementById('fb').className='fb hidden';
  document.getElementById('nxt').style.display='none';
  document.getElementById('res').style.display='block';
  let msg='';
  if(pct===100)msg='🎉 満点！完璧な地図力です！';
  else if(pct>=80)msg='👏 優秀！あと少しで完璧！';
  else if(pct>=60)msg='📚 まずまず。苦手な地域を復習しましょう。';
  else msg='🗺️ もう一度地図を確認してみましょう。';
  document.getElementById('resT').innerHTML=`${sc} / ${total} 問正解（${pct}%）<br>${msg}`;
}
