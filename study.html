<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">

<title>コーヒー1級 チューター</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1a2e;--card:#16213e;--accent:#c8a96e;--accent2:#e8d5a8;
  --text:#e0e0e0;--text2:#999;--correct:#4caf50;--wrong:#e74c3c;
  --chat-user:#2a3a5e;--chat-bot:#1e2d4a;
}
html,body{height:100%;font-family:'Helvetica Neue','Hiragino Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
#app{display:flex;flex-direction:column;height:100%;max-width:600px;margin:0 auto;position:relative}

/* Header */
.header{
  background:linear-gradient(135deg,#16213e,#0f3460);
  padding:12px 16px;display:flex;align-items:center;gap:12px;
  border-bottom:1px solid rgba(200,169,110,0.3);flex-shrink:0;
}
.home-link{text-decoration:none;font-size:18px;flex-shrink:0;padding:4px;opacity:0.7;transition:opacity 0.15s}
.home-link:active{opacity:1}
.header-avatar{width:40px;height:40px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.header-info{flex:1;min-width:0}
.header-name{font-size:15px;font-weight:700;color:var(--accent2)}
.header-status{font-size:11px;color:var(--correct);display:flex;align-items:center;gap:4px}
.header-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--correct);display:inline-block}
.header-stats{display:flex;gap:8px;font-size:11px;color:var(--accent)}
.stat-badge{background:rgba(200,169,110,0.15);padding:3px 8px;border-radius:10px;white-space:nowrap}

/* Chat area */
.chat-area{flex:1;overflow-y:auto;padding:12px 12px 8px;display:flex;flex-direction:column;gap:8px}
.chat-area::-webkit-scrollbar{width:4px}
.chat-area::-webkit-scrollbar-thumb{background:rgba(200,169,110,0.3);border-radius:2px}

.msg{max-width:88%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.65;word-break:break-word}
.msg-bot{background:var(--chat-bot);align-self:flex-start;border-bottom-left-radius:4px}
.msg-user{background:var(--chat-user);align-self:flex-end;border-bottom-right-radius:4px;color:var(--accent2)}
.msg-system{align-self:center;background:rgba(200,169,110,0.12);color:var(--accent);font-size:12px;padding:6px 14px;border-radius:20px;text-align:center}

.msg b,.msg strong{color:var(--accent2)}
.msg .keyword{color:var(--accent);font-weight:700}
.msg .hint{color:var(--text2);font-size:12px;font-style:italic}
.msg .correct-mark{color:var(--correct);font-weight:700}
.msg .wrong-mark{color:var(--wrong);font-weight:700}
.msg .explain-box{background:rgba(200,169,110,0.08);border-left:3px solid var(--accent);padding:8px 10px;margin-top:8px;border-radius:0 8px 8px 0;font-size:13px}

/* Typing indicator */
.typing{display:flex;gap:4px;padding:12px 16px;align-self:flex-start}
.typing span{width:7px;height:7px;background:var(--text2);border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}

/* Quiz options */
.quiz-options{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.quiz-btn{
  background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.3);
  color:var(--text);padding:10px 14px;border-radius:12px;font-size:14px;
  cursor:pointer;text-align:left;transition:all 0.2s;display:flex;align-items:center;gap:8px;
}
.quiz-btn:hover{background:rgba(200,169,110,0.2);border-color:var(--accent)}
.quiz-btn:active{transform:scale(0.98)}
.quiz-btn.correct{background:rgba(76,175,80,0.2);border-color:var(--correct);color:var(--correct)}
.quiz-btn.wrong{background:rgba(231,76,60,0.15);border-color:var(--wrong);color:var(--wrong)}
.quiz-btn.reveal{border-color:var(--correct);color:var(--correct)}
.quiz-btn:disabled{cursor:default;opacity:0.85}
.opt-label{font-weight:700;color:var(--accent);min-width:22px}

/* Bottom bar */
.bottom-bar{
  flex-shrink:0;padding:8px 12px 12px;
  background:linear-gradient(0deg,var(--bg) 80%,transparent);
  display:flex;flex-direction:column;gap:6px;
}
.action-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.action-btn{
  background:linear-gradient(135deg,rgba(200,169,110,0.2),rgba(200,169,110,0.1));
  border:1px solid rgba(200,169,110,0.4);color:var(--accent2);
  padding:10px 16px;border-radius:20px;font-size:13px;font-weight:600;
  cursor:pointer;transition:all 0.2s;white-space:nowrap;
}
.action-btn:hover{background:rgba(200,169,110,0.3);transform:translateY(-1px)}
.action-btn:active{transform:scale(0.97)}
.action-btn.primary{background:linear-gradient(135deg,var(--accent),#b8944e);color:#1a1a2e;border:none}

/* Progress bar */
.progress-wrap{padding:0 4px}
.progress-outer{background:rgba(255,255,255,0.08);border-radius:6px;height:6px;overflow:hidden}
.progress-inner{height:100%;background:linear-gradient(90deg,var(--accent),#e8d5a8);border-radius:6px;transition:width 0.5s ease}
.progress-label{font-size:10px;color:var(--text2);text-align:center;margin-top:2px}

/* Menu overlay */
.menu-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);
  display:none;z-index:100;justify-content:center;align-items:center;
}
.menu-overlay.show{display:flex}
.menu-card{
  background:var(--card);border-radius:20px;padding:24px;max-width:500px;width:90%;
  max-height:80vh;overflow-y:auto;border:1px solid rgba(200,169,110,0.2);
}
.menu-card h2{color:var(--accent2);font-size:18px;margin-bottom:16px;text-align:center}
.menu-item{
  padding:12px 14px;border-radius:12px;margin-bottom:6px;cursor:pointer;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
  transition:all 0.2s;
}
.menu-item:hover{background:rgba(200,169,110,0.1);border-color:rgba(200,169,110,0.3)}
.menu-item .ch-name{font-size:14px;font-weight:600}
.menu-item .ch-sub{font-size:11px;color:var(--text2);margin-top:2px}
.menu-item .ch-badge{font-size:11px;padding:3px 8px;border-radius:8px;white-space:nowrap}
.ch-badge.done{background:rgba(76,175,80,0.2);color:var(--correct)}
.ch-badge.progress{background:rgba(200,169,110,0.2);color:var(--accent)}
.ch-badge.new{background:rgba(255,255,255,0.08);color:var(--text2)}
.menu-close{
  display:block;margin:12px auto 0;background:none;border:1px solid rgba(200,169,110,0.3);
  color:var(--accent);padding:8px 24px;border-radius:16px;cursor:pointer;font-size:13px;
}

/* Welcome screen */
.welcome{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;text-align:center;gap:16px;
}
.welcome-icon{font-size:64px}
.welcome h1{font-size:22px;color:var(--accent2);font-weight:800}
.welcome p{font-size:14px;color:var(--text2);line-height:1.7;max-width:320px}
.welcome .start-btn{
  background:linear-gradient(135deg,var(--accent),#b8944e);color:#1a1a2e;
  border:none;padding:14px 40px;border-radius:24px;font-size:16px;font-weight:700;
  cursor:pointer;margin-top:8px;transition:transform 0.2s;
}
.welcome .start-btn:hover{transform:scale(1.03)}

/* Today's norma card */
.today-card{
  background:linear-gradient(135deg,#16213e,#0f3460);width:100%;max-width:360px;
  border-radius:16px;padding:16px 18px;border:1px solid rgba(200,169,110,0.3);text-align:left;
}
.today-date{font-size:12px;color:var(--accent);font-weight:700;margin-bottom:6px}
.today-title{font-size:16px;color:var(--accent2);font-weight:800;margin-bottom:8px}
.today-tasks{list-style:none;padding:0}
.today-tasks li{font-size:13px;color:var(--text);padding:5px 0;display:flex;align-items:center;gap:8px;border-bottom:1px solid rgba(255,255,255,0.04)}
.today-tasks li:last-child{border-bottom:none}
.today-tasks .task-icon{font-size:14px;flex-shrink:0}
.today-tasks .task-done{text-decoration:line-through;color:var(--text2)}
.today-overall{margin-top:10px;font-size:11px;color:var(--text2);text-align:center}
.today-overall b{color:var(--accent)}

/* Schedule overlay additions */
.sched-tabs{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px}
.sched-tab{
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  color:var(--text2);padding:6px 12px;border-radius:12px;font-size:11px;cursor:pointer;white-space:nowrap;
  transition:all 0.2s;flex-shrink:0;
}
.sched-tab.active{background:rgba(200,169,110,0.2);border-color:var(--accent);color:var(--accent2)}
.sched-tab.current{box-shadow:0 0 0 2px var(--accent)}
.sched-day{
  padding:8px 12px;border-radius:10px;margin-bottom:4px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;background:rgba(255,255,255,0.02);
}
.sched-day.today{background:rgba(200,169,110,0.15);border:1px solid rgba(200,169,110,0.4)}
.sched-day.past-done{opacity:0.5}
.sched-day .day-date{color:var(--accent);font-weight:700;min-width:50px}
.sched-day .day-task{flex:1;margin-left:8px}
.sched-day .day-status{font-size:11px;flex-shrink:0;margin-left:4px}
.welcome-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:4px}
</style>
</head>
<body>
<div id="app"></div>
<div class="menu-overlay" id="menuOverlay">

function getToday(){
  const d=new Date();
  return {m:d.getMonth()+1,d:d.getDate(),y:d.getFullYear()};
}
function dateToNum(m,d){ return m*100+d; }
function getTodaySchedule(){
  const t=getToday();
  return SCHEDULE.find(s=>s[0]===t.m && s[1]===t.d) || null;
}
function getWeekNum(m,d){
  const start=dateToNum(4,12);
  const cur=dateToNum(m,d);
  // approximate week number
  const startDate=new Date(2026,3,12);
  const curDate=new Date(2026,m-1,d);
  const diff=Math.floor((curDate-startDate)/(7*24*60*60*1000));
  return Math.max(0,Math.min(11,diff))+1;
}
function isTodayDone(sched){
  if(!sched||sched[4]==='rest'||sched[4]==='mock') return false;
  const chIds=sched[3];
  if(chIds.length===0) return false;
  return chIds.every(id=>{
    const p=state.progress[id];
    return p && p.completed>=p.total;
  });
}

function startTodayNorma(){
  const todaySched=getTodaySchedule();
  if(!todaySched||todaySched[4]==='rest'){
    showMenu();return;
  }
  if(todaySched[4]==='mock'){
    // For mock tests, pick random incomplete or all chapters
    showMenu();return;
  }
  const chIds=todaySched[3];
  if(chIds.length===0){showMenu();return;}
  // Find first incomplete chapter in today's list
  let targetId=null;
  for(const id of chIds){
    const p=state.progress[id];
    if(!p||p.completed<p.total){targetId=id;break;}
  }
  if(!targetId) targetId=chIds[0]; // all done, just open first
  selectChapter(targetId);
}

function showScheduleView(){
  const today=getToday();
  const todayNum=dateToNum(today.m,today.d);
  // Group by week
  let weeks={};
  SCHEDULE.forEach(s=>{
    const w=getWeekNum(s[0],s[1]);
    if(!weeks[w]) weeks[w]=[];
    weeks[w].push(s);
  });
  const currentWeek=getWeekNum(today.m,today.d);

  let tabsHtml='';
  for(let w=1;w<=12;w++){
    const isCur=w===currentWeek;
    tabsHtml+=`<div class="sched-tab${isCur?' active current':''}" onclick="showScheduleWeek(${w})">${w===12?'直前週':'W'+w}</div>`;
  }

  let daysHtml='';
  const weekData=weeks[currentWeek]||[];
  weekData.forEach(s=>{
    const sNum=dateToNum(s[0],s[1]);
    const isToday=sNum===todayNum;
    const isPast=sNum<todayNum;
    const typeIcons={new:'📖',review:'🔄',rest:'😴',mock:'📝'};
    const done=isTodayDone(s);
    let statusHtml='';
    if(done) statusHtml='<span style="color:var(--correct)">✅</span>';
    else if(isToday) statusHtml='<span style="color:var(--accent)">👈 今日</span>';
    else if(isPast) statusHtml='<span style="color:var(--text2)">—</span>';

    daysHtml+=`<div class="sched-day${isToday?' today':''}${isPast&&done?' past-done':''}">
      <span class="day-date">${s[0]}/${s[1]}</span>
      <span class="day-task">${typeIcons[s[4]]||''} ${s[2]}</span>
      <span class="day-status">${statusHtml}</span>
    </div>`;
  });

  menuCard.innerHTML=`
    <h2>📆 学習スケジュール</h2>
    <div style="text-align:center;font-size:12px;color:var(--text2);margin-bottom:8px">4/12〜7/4 全12週間</div>
    <div class="sched-tabs" id="schedTabs">${tabsHtml}</div>
    <div id="schedDays">${daysHtml}</div>
    <button class="menu-close" onclick="closeMenu()">閉じる</button>
  `;
  menuOverlay.classList.add('show');
}

function showScheduleWeek(w){
  const today=getToday();
  const todayNum=dateToNum(today.m,today.d);
  let weeks={};
  SCHEDULE.forEach(s=>{
    const wk=getWeekNum(s[0],s[1]);
    if(!weeks[wk]) weeks[wk]=[];
    weeks[wk].push(s);
  });

  // Update tabs
  document.querySelectorAll('.sched-tab').forEach((tab,i)=>{
    tab.classList.toggle('active',i+1===w);
  });

  const weekData=weeks[w]||[];
  let daysHtml='';
  const typeIcons={new:'📖',review:'🔄',rest:'😴',mock:'📝'};
  weekData.forEach(s=>{
    const sNum=dateToNum(s[0],s[1]);
    const isToday=sNum===todayNum;
    const isPast=sNum<todayNum;
    const done=isTodayDone(s);
    let statusHtml='';
    if(done) statusHtml='<span style="color:var(--correct)">✅</span>';
    else if(isToday) statusHtml='<span style="color:var(--accent)">👈 今日</span>';
    else if(isPast) statusHtml='<span style="color:var(--text2)">—</span>';

    daysHtml+=`<div class="sched-day${isToday?' today':''}${isPast&&done?' past-done':''}">
      <span class="day-date">${s[0]}/${s[1]}</span>
      <span class="day-task">${typeIcons[s[4]]||''} ${s[2]}</span>
      <span class="day-status">${statusHtml}</span>
    </div>`;
  });
  document.getElementById('schedDays').innerHTML=daysHtml;
}

      html+=`<button class="action-btn primary" onclick="startQuiz()">クイズに挑戦！</button>`;
    }
  } else if(state.phase==='result'){
    if(state.currentLesson < ch.lessons.length-1){
      html+=`<button class="action-btn primary" onclick="nextLesson()">次のレッスン ▶</button>`;
    } else {
      html+=`<button class="action-btn primary" onclick="finishChapter()">章を完了！ 🎉</button>`;
    }
  }
  html+=`<button class="action-btn" onclick="showMenu()">📚 章を選ぶ</button>`;
  html+=`</div></div>`;

  app.innerHTML=html;

  // Scroll to bottom
  requestAnimationFrame(()=>{
    const area=document.getElementById('chatArea');
    if(area) area.scrollTop=area.scrollHeight;
  });
}

// --- MENU ---
function showMenu(){
  const todaySched=getTodaySchedule();
  const todayChIds=todaySched?todaySched[3]:[];

  let parts={};
  CHAPTERS.forEach(ch=>{
    if(!parts[ch.part]) parts[ch.part]=[];
    parts[ch.part].push(ch);
  });

  let html=`<h2>📚 章を選択</h2>`;

  // Show today's norma at top if applicable
  if(todaySched && todayChIds.length>0){
    const today=getToday();
    html+=`<div style="background:rgba(200,169,110,0.1);border:1px solid rgba(200,169,110,0.3);border-radius:12px;padding:10px 14px;margin-bottom:12px">`;
    html+=`<div style="color:var(--accent);font-size:12px;font-weight:700;margin-bottom:6px">📅 ${today.m}/${today.d} 今日のノルマ：${todaySched[2]}</div>`;
    todayChIds.forEach(id=>{
      const ch=CHAPTERS.find(c=>c.id===id);
      if(!ch) return;
      const p=state.progress[id];
      const done=p&&p.completed>=p.total;
      html+=`<div class="menu-item" style="margin-bottom:4px;${done?'opacity:0.6':''}" onclick="selectChapter('${id}')">
        <div><div class="ch-name">${done?'✅ ':'📌 '}${ch.icon} ${ch.title}</div></div>
        ${done?'<span class="ch-badge done">完了</span>':'<span class="ch-badge progress">学習する</span>'}
      </div>`;
    });
    html+=`</div>`;
  }

  for(let part in parts){
    html+=`<div style="color:var(--accent);font-size:12px;font-weight:700;margin:12px 0 6px;padding-left:4px">${part}</div>`;
    parts[part].forEach(ch=>{
      const p=state.progress[ch.id];
      const isToday=todayChIds.includes(ch.id);
      let badge='';
      if(p.completed>=p.total) badge=`<span class="ch-badge done">✓ 完了</span>`;
      else if(p.completed>0) badge=`<span class="ch-badge progress">${p.completed}/${p.total}</span>`;
      else badge=`<span class="ch-badge new">未学習</span>`;
      html+=`<div class="menu-item" style="${isToday?'border-color:rgba(200,169,110,0.5);background:rgba(200,169,110,0.05)':''}" onclick="selectChapter('${ch.id}')">
        <div><div class="ch-name">${ch.icon} ${ch.title}${isToday?' <span style="font-size:10px;color:var(--accent)">📅今日</span>':''}</div><div class="ch-sub">${ch.lessons.length}レッスン</div></div>
        ${badge}
      </div>`;
    });
  }
  const totalQ=state.totalAnswered;
  const totalC=state.totalCorrect;
  if(totalQ>0){
    html+=`<div style="text-align:center;margin-top:16px;font-size:12px;color:var(--text2)">
      累計: ${totalC}/${totalQ}問正解 (${Math.round(totalC/totalQ*100)}%) | 最長連続正解: ${state.bestStreak}問
    </div>`;
  }
  html+=`<button class="menu-close" onclick="closeMenu()">閉じる</button>`;
  menuCard.innerHTML=html;
  menuOverlay.classList.add('show');
}

function closeMenu(){menuOverlay.classList.remove('show')}

function selectChapter(id){
  closeMenu();
  const ch=CHAPTERS.find(c=>c.id===id);
  if(!ch) return;
  state.screen='chat';
  state.currentChapter=id;
  // Start from first incomplete lesson
  const p=state.progress[id];
  state.currentLesson=Math.min(p.completed, ch.lessons.length-1);
  state.phase='teach';
  state.teachIndex=0;
  state.answered=false;
  state.messages=[];

  // System message
  addMsg('system',`${ch.icon} ${ch.title} — レッスン${state.currentLesson+1}/${ch.lessons.length}`);

  // First teach
  const lesson=ch.lessons[state.currentLesson];
  addMsg('bot',`<b>レッスン${state.currentLesson+1}</b>を始めましょう！`);
  addMsg('bot',lesson.teach[0]);
  state.teachIndex=1;

  render();
}

// --- MESSAGES ---
function addMsg(type,html){
  state.messages.push({type:`msg-${type}`,html});
}

// --- TEACH FLOW ---
function nextTeach(){
  const ch=CHAPTERS.find(c=>c.id===state.currentChapter);
  const lesson=ch.lessons[state.currentLesson];
  if(state.teachIndex < lesson.teach.length){
    addMsg('bot',lesson.teach[state.teachIndex]);
    state.teachIndex++;
  }
  render();
}

function startQuiz(){
  addMsg('user','理解しました！クイズお願いします');
  const ch=CHAPTERS.find(c=>c.id===state.currentChapter);
  const lesson=ch.lessons[state.currentLesson];
  const q=lesson.quiz;

  let optHtml=`<div class="quiz-options">`;
  const labels=['A','B','C','D'];
  q.opts.forEach((opt,i)=>{
    optHtml+=`<button class="quiz-btn" id="qopt${i}" onclick="answerQuiz(${i})"><span class="opt-label">${labels[i]}</span>${opt}</button>`;
  });
  optHtml+=`</div>`;

  addMsg('bot',`<b>🧠 クイズ</b><br>${q.q}${optHtml}`);
  state.phase='quiz';
  state.answered=false;
  render();
}

function answerQuiz(idx){
  if(state.answered) return;
  state.answered=true;

  const ch=CHAPTERS.find(c=>c.id===state.currentChapter);
  const lesson=ch.lessons[state.currentLesson];
  const q=lesson.quiz;
  const correct=idx===q.ans;

  state.totalAnswered++;
  if(correct){
    state.totalCorrect++;
    state.streak++;
    if(state.streak>state.bestStreak) state.bestStreak=state.streak;
  } else {
    state.streak=0;
  }

  // Update buttons
  const labels=['A','B','C','D'];
  for(let i=0;i<q.opts.length;i++){
    const btn=document.getElementById('qopt'+i);
    if(!btn) continue;
    btn.disabled=true;
    if(i===q.ans) btn.classList.add(i===idx?'correct':'reveal');
    else if(i===idx) btn.classList.add('wrong');
  }

  // Result message
  addMsg('user',`${labels[idx]}. ${q.opts[idx]}`);

  if(correct){
    const praises=['素晴らしい！','正解です！','その通り！','完璧！','お見事！'];
    addMsg('bot',`<span class="correct-mark">⭕ ${praises[Math.random()*praises.length|0]}</span>${state.streak>=3?` 🔥${state.streak}連続正解！`:''}<div class="explain-box">${q.explain}</div>`);
  } else {
    addMsg('bot',`<span class="wrong-mark">❌ 惜しい！正解は <b>${labels[q.ans]}. ${q.opts[q.ans]}</b> です。</span><div class="explain-box">${q.explain}</div>`);
  }

  // Mark lesson completed
  const p=state.progress[ch.id];
  if(state.currentLesson>=p.completed) p.completed=state.currentLesson+1;

  state.phase='result';
  render();
}

function nextLesson(){
  const ch=CHAPTERS.find(c=>c.id===state.currentChapter);
  state.currentLesson++;
  state.phase='teach';
  state.teachIndex=0;
  state.answered=false;

  addMsg('system',`レッスン${state.currentLesson+1}/${ch.lessons.length}`);
  const lesson=ch.lessons[state.currentLesson];
  addMsg('bot',`<b>レッスン${state.currentLesson+1}</b>に進みましょう！`);
  addMsg('bot',lesson.teach[0]);
  state.teachIndex=1;
  render();
}

function finishChapter(){
  const ch=CHAPTERS.find(c=>c.id===state.currentChapter);
  addMsg('system',`🎉 ${ch.title} 完了！`);

  // Check if today's norma is now complete
  const todaySched=getTodaySchedule();
  const todayDone=isTodayDone(todaySched);
  const todayChIds=todaySched?todaySched[3]:[];
  const nextCh=todayChIds.find(id=>{
    const p=state.progress[id];
    return !p||p.completed<p.total;
  });

  let extraMsg='';
  if(todayDone && todaySched){
    extraMsg=`<br><br>🎊 <b>今日のノルマ達成！</b>お疲れ様でした！`;
  } else if(nextCh){
    const nch=CHAPTERS.find(c=>c.id===nextCh);
    extraMsg=`<br><br>今日のノルマの次は：<b>${nch?nch.icon+' '+nch.title:''}</b>`;
  }

  addMsg('bot',`おめでとうございます！<b>${ch.title}</b>の全レッスンを完了しました！🎉${extraMsg}`);
  state.phase='result';
  render();

  if(todayDone){
    setTimeout(goHome,2000);
  } else if(nextCh){
    setTimeout(()=>selectChapter(nextCh),2000);
  } else {
    setTimeout(showMenu,1500);
  }
}

function goHome(){
  state.screen='welcome';
  state.currentChapter=null;
  state.messages=[];
  render();
}

// --- INIT ---
render();
</script>
</body>
</html>
